<!doctype html>
<html lang="es-CL">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>TÜcom — En mantención</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0F0F1A;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .wrap { max-width: 360px; }
      .logo {
        width: 88px; height: 88px; margin: 0 auto 24px;
        border-radius: 24px;
        background: linear-gradient(135deg, #7C3AED, #6366F1);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 20px 60px -20px rgba(124, 58, 237, 0.6);
        font-size: 44px; font-weight: 800; letter-spacing: -0.02em;
      }
      h1 { font-size: 22px; font-weight: 700; margin: 0 0 8px; }
      p { font-size: 14px; line-height: 1.5; color: rgba(255,255,255,0.7); margin: 0 0 24px; }
      a.btn {
        display: inline-block;
        background: linear-gradient(135deg, #7C3AED, #6366F1);
        color: #fff; text-decoration: none;
        padding: 12px 20px; border-radius: 12px; font-weight: 600; font-size: 14px;
      }
      .small { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 24px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo">TÜ</div>
      <h1>Estamos en mantención</h1>
      <p>Estamos realizando trabajos programados para mejorar la app. Volvemos pronto.</p>
      <a class="btn" href="/">Reintentar</a>
      <div class="small">¿Sigues con problemas? Escríbenos a soporte@tucombustible.cl</div>
    </div>
  </body>
</html>
